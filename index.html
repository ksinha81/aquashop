<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AquaShop - Fish Store</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Poppins',sans-serif;background:#f0f8ff;color:#333;}

    /* NAV */
    nav{background:linear-gradient(135deg,#0077b6,#00b4d8);color:white;padding:16px 28px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 10px rgba(0,0,0,.2);}
    .logo{font-size:1.4rem;font-weight:700;} .logo span{color:#90e0ef;}
    .tagline{font-size:.75rem;opacity:.85;}

    /* HERO */
    .hero{background:linear-gradient(135deg,#0077b6,#00b4d8,#90e0ef);color:white;text-align:center;padding:50px 20px 32px;}
    .hero h1{font-size:2rem;font-weight:700;margin-bottom:8px;}
    .hero p{font-size:.95rem;opacity:.9;margin-bottom:20px;}
    .hero .fish-emoji{font-size:2.8rem;display:block;margin-bottom:8px;}

    /* GLOBAL SEARCH */
    .global-search{background:white;padding:16px 24px;box-shadow:0 2px 8px rgba(0,0,0,.07);display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
    .global-search input{flex:1;min-width:200px;padding:11px 16px;border:2px solid #b0dff0;border-radius:30px;font-family:'Poppins',sans-serif;font-size:.9rem;outline:none;}
    .global-search input:focus{border-color:#0077b6;}
    .global-search select{padding:11px 14px;border:2px solid #b0dff0;border-radius:30px;font-family:'Poppins',sans-serif;font-size:.85rem;background:white;outline:none;}

    /* TABS */
    .tabs{display:flex;justify-content:center;gap:10px;background:#e8f7fc;padding:14px;flex-wrap:wrap;}
    .tab-btn{padding:9px 20px;border:2px solid #00b4d8;background:white;color:#00b4d8;border-radius:30px;cursor:pointer;font-family:'Poppins',sans-serif;font-weight:600;font-size:.85rem;transition:all .2s;}
    .tab-btn.active,.tab-btn:hover{background:#00b4d8;color:white;}

    /* SECTIONS */
    .section{display:none;padding:28px 18px;max-width:1100px;margin:0 auto;}
